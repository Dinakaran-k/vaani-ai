name: vaani_ai
description: Multilingual AI voice assistant for small businesses in India.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_storage: ^12.4.9
  firebase_messaging: ^15.2.9
  firebase_analytics: ^11.5.2
  firebase_crashlytics: ^4.3.9
  google_sign_in: ^6.2.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2
  google_mlkit_text_recognition: ^0.14.0
  camera: ^0.11.1
  mobile_scanner: ^6.0.7
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  pdf: ^3.11.3
  printing: ^5.14.2
  excel: ^4.0.6
  connectivity_plus: ^6.1.3
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/models/custom_intent_model.json
